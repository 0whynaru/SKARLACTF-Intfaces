    <script>
    

  const intro = document.getElementById('intro');
  const main  = document.getElementById('main');

  function masuk() {
    intro.classList.add('fade-out');
    setTimeout(() => {
      intro.style.display = 'none';
      main.classList.add('visible');
    }, 150);
  }

  // otomatis masuk setelah 4.5 detik, atau klik/tap intro untuk skip
  setTimeout(masuk, 500);
  intro.addEventListener('click', masuk);

        const togglePassword = document.getElementById("togglePassword");
        const password = document.getElementById("password");

        togglePassword.addEventListener("click", () => {

            const type = password.getAttribute("type") === "password"
                ? "text"
                : "password";
            password.setAttribute("type", type);

            togglePassword.classList.toggle("ri-eye-line");
            togglePassword.classList.toggle("ri-eye-off-line");
        });
        const signup = document.getElementsByClassName('');
        function signUp() {
            window.location.href = "singup.html"; 
        }
        async function showLogin() {
            const fd = document.getElementById('csa')
            const welcome = document.getElementById('welcome-screen');
            const login = document.getElementById('login-screen');
            welcome.style.transition = "all 0.5s ease, opacity 0.5s ease, transform 0.5s ease";
            fd.style.transition = "opacity 0.5s ease, filter 0.1s ease";
            welcome.style.opacity = "0";;
            welcome.style.transform = "translateY(-20px)";
            fd.style.filter = "blur(5px)";
            fd.style.opacity = "0"
            setTimeout(() => {
                welcome.style.display = 'none';
                login.style.display = 'block';
                fd.style.opacity = "0"
                fd.style.filter = "blur(5px)";
                setTimeout(() => {
                    fd.style.transition = "opacity 1s ease, filter 3s ease";
                    fd.style.opacity = "1"
                    
                    fd.style.transition = "opacity 0.5s ease";
                    login.style.transition = "all 0.5s ease, opacity 0.5s ease, transform 0.5s ease";
                    login.style.opacity = '1';
                    login.style.transform = "translateY(0)";
                    fd.style.filter = "blur(0px)";
                }, 10);
            }, 100);

        }
    </script>
